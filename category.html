<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineScope | Category View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .grid-movie { height: 320px; min-width: 0; position: relative; }
        .grid-movie img { height: 260px; }
        .grid-movie-info { padding: 10px; font-size: 0.9rem; }
    </style>
</head>
<body class="dark">
    <header>
        <div class="logo">Cine<span>Scope</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
        <div class="search-box">
            <input type="text" id="srch" placeholder="Search categories...">
            <button id="goBtn">Go</button>
        </div>
    </header>

    <main>
        <h1 id="cat-title" style="margin: 2rem 5%; font-size: 2.5rem;">Movies</h1>
        <div id="grid-container" class="grid-view">
            <!-- Grid movies here -->
        </div>
        <div id="loader" class="hidden">
            <div class="spinner"></div>
        </div>
    </main>

    <!-- Modal for details -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeM()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        (async () => {
            await initConfig();
            window.API_KEY = window.config?.API_KEY || "";
            window.BASE_URL = window.config?.BASE_URL || "";
            window.GROQ_KEY = window.config?.GROQ_KEY || "";
            const s = document.createElement('script');
            s.src = "category.js";
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
